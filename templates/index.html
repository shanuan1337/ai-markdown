<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.md converter</title>
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
    <link rel="apple-touch-icon" sizes="48x48" href="/static/favicon-48.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container-fluid">
        <div class="row h-100">
            <div class="col-1 sidebar">
                <button class="btn-markdown" id="convertBtn">Преобразовать</button>
                <button class="cheatsheet-btn" id="toggleCheatsheet">Подсказка</button>
                <div class="cheatsheet" id="cheatsheet">
                    <table>
                        <tr><th>Элемент</th><th>Синтаксис</th></tr>
                        <tr><td>H1</td><td><code># текст</code></td></tr>
                        <tr><td>H2</td><td><code>## текст</code></td></tr>
                        <tr><td>Жирный</td><td><code>**текст**</code></td></tr>
                        <tr><td>Курсив</td><td><code>*текст*</code></td></tr>
                        <tr><td>Список</td><td><code>- пункт</code></td></tr>
                        <tr><td>Код</td><td><code>`код`</code></td></tr>
                        <tr><td>Блок</td><td><code>```язык</code></td></tr>
                        <tr><td>Таблица</td><td><code>| A | B |</code></td></tr>
                    </table>
                </div>
            </div>
            <div class="col-11 main-content">
                <div class="text-panel">
                    <div class="panel-title">Исходный текст</div>
                    <textarea id="input" placeholder="Вставьте текст..."></textarea>
                </div>
                <div class="result-panel">
                    <div class="result-top">
                        <div class="panel-title">Markdown-код ✎</div>
                        <textarea id="output" placeholder="Результат..."></textarea>
                    </div>
                    <div class="result-bottom" id="preview">
                        <span style="color: #666;">Визуализация появится здесь...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const preview = document.getElementById('preview');
        const btn = document.getElementById('convertBtn');
        const toggleBtn = document.getElementById('toggleCheatsheet');
        const cheatsheet = document.getElementById('cheatsheet');

        function updatePreview() {
            const md = output.value;
            if (md.trim()) preview.innerHTML = marked.parse(md);
            else preview.innerHTML = '<span style="color: #666;">Визуализация появится здесь...</span>';
        }

        output.addEventListener('input', updatePreview);

        toggleBtn.addEventListener('click', () => {
            cheatsheet.style.display = (cheatsheet.style.display === 'block') ? 'none' : 'block';
        });

        btn.addEventListener('click', async () => {
            const text = input.value.trim();
            if (!text) { alert('Введите текст для преобразования.'); return; }
            btn.disabled = true; btn.textContent = '...';
            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await response.json();
                output.value = data.error ? ('Ошибка: ' + data.error) : data.markdown;
                updatePreview();
            } catch (err) {
                output.value = 'Ошибка соединения: ' + err.message;
                updatePreview();
            } finally {
                btn.disabled = false; btn.textContent = 'Преобразовать';
            }
        });
    </script>
</body>
</html>
